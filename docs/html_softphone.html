<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>MORONAVILA PHONE</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        rose: {
                            600: '#e11d48',
                        },
                        emerald: {
                            500: '#10b981',
                        },
                        slate: {
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        .glass-panel {
          background: rgba(2, 6, 23, 0.95);
          backdrop-filter: blur(40px);
          -webkit-backdrop-filter: blur(40px);
          border: 1px solid rgba(255, 255, 255, 0.1);
          box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .soft-rose-glow {
          box-shadow: 0 0 15px rgba(225, 29, 72, 0.3);
        }
        .soft-emerald-glow {
          box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
        }
        .letter-spacing-vpr {
          letter-spacing: 0.15em;
        }
        .numpad-btn {
          transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .numpad-btn:hover {
          background-color: rgba(255, 255, 255, 0.08);
          box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.4);
        }
        .numpad-btn:active {
          transform: scale(0.92);
          background-color: rgba(255, 255, 255, 0.15);
          box-shadow: inset 0 4px 6px 0 rgba(0, 0, 0, 0.6);
        }
    </style>
    <style>
        body {
            height: 100vh;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            background-color: #09090b;
        }

        #expanded-panel {
            height: 100%;
            height: 100dvh;
        }
    </style>
</head>

<body class="flex items-center justify-center">
    <div class="relative z-50 transition-all duration-500 ease-in-out w-full max-w-[360px] h-full flex flex-col justify-center"
        id="softphone-wrapper">
        <!-- Main Panel -->
        <div class="glass-panel w-full overflow-hidden flex flex-col shadow-2xl border border-white/10"
            id="expanded-panel">
            <!-- Enlarged Visor Area -->
            <header class="px-5 pt-8 pb-6 border-b border-white/5 bg-white/5 shrink-0">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h1 class="text-white/80 text-[10px] font-black letter-spacing-vpr uppercase mb-1">MORONAVILA
                            PHONE</h1>
                        <h2 class="text-white text-2xl font-bold leading-tight">Gabriel Silva</h2>
                    </div>
                    <div class="flex flex-col items-end gap-3">
                        <div class="flex items-center gap-2">
                            <div class="transition-colors duration-500 text-emerald-500" id="status-signal">
                                <svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M18,10 C18,10 19,11 19,12 C19,13 18,14 18,14 M21,7 C21,7 23,9.5 23,12 C23,14.5 21,17 21,17 M3,17 C3,17 1,14.5 1,12 C1,9.5 3,7 3,7 M6,14 C6,14 5,13 5,12 C5,11 6,10 6,10 M12,20 L12,20 C10.9,20 10,19.1 10,18 L10,6 C10,4.9 10.9,4 12,4 L12,4 C13.1,4 14,4.9 14,6 L14,18 C14,19.1 13.1,20 12,20 Z"
                                        fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2">
                                    </path>
                                </svg>
                            </div>
                            <button class="p-1.5 hover:bg-white/10 rounded-lg transition-colors text-white/40"
                                onclick="toggleSoftphone()">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round"
                                        stroke-width="2"></path>
                                </svg>
                            </button>
                        </div>
                        <!-- Notification Icons in Visor -->
                        <div class="flex items-center gap-4">
                            <div class="flex items-center transition-opacity duration-300 opacity-20"
                                id="badge-package">
                                <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor"
                                    viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
                                        stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                                </svg>
                            </div>
                            <div class="flex items-center transition-opacity duration-300 opacity-20"
                                id="badge-message">
                                <svg class="w-4 h-4 text-sky-500" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"
                                        stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-emerald-500 text-xs font-bold uppercase tracking-wider">Online • Ramal 402</span>
                    <span class="ml-auto text-[10px] px-3 py-1 rounded-full bg-white/10 text-white/70 font-semibold"
                        id="status-badge">Pronto</span>
                </div>
            </header>
            <main class="px-5 py-4 flex flex-col flex-1 justify-between overflow-hidden">
                <!-- Shortcuts -->
                <section class="shrink-0" data-purpose="quick-actions">
                    <p class="text-white/50 text-[10px] font-black letter-spacing-vpr uppercase mb-3">Atalhos Rápidos
                    </p>
                    <div class="grid grid-cols-4 gap-2">
                        <button
                            class="flex flex-col items-center justify-center gap-2 p-2 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/10 transition-all">
                            <div
                                class="w-10 h-10 rounded-xl bg-zinc-800 flex items-center justify-center text-white/90">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
                                        stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                                </svg>
                            </div>
                            <span
                                class="text-[8px] text-white/60 font-bold uppercase truncate w-full text-center">Portaria</span>
                        </button>
                        <button
                            class="flex flex-col items-center justify-center gap-2 p-2 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/10 transition-all">
                            <div
                                class="w-10 h-10 rounded-xl bg-zinc-800 flex items-center justify-center text-white/90">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                                        stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                                </svg>
                            </div>
                            <span
                                class="text-[8px] text-white/60 font-bold uppercase truncate w-full text-center">Admin</span>
                        </button>
                        <button
                            class="flex flex-col items-center justify-center gap-2 p-2 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/10 transition-all">
                            <div
                                class="w-10 h-10 rounded-xl bg-zinc-800 flex items-center justify-center text-white/90">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
                                        stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                                </svg>
                            </div>
                            <span class="text-[8px] text-white/60 font-bold uppercase truncate w-full text-center">Sala
                                Estudo</span>
                        </button>
                        <button
                            class="flex flex-col items-center justify-center gap-2 p-2 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/10 transition-all">
                            <div
                                class="w-10 h-10 rounded-xl bg-zinc-800 flex items-center justify-center text-white/90">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M3 3h18v18H3V3z M12 3v18 M3 12h18" stroke-linecap="round"
                                        stroke-linejoin="round" stroke-width="2"></path>
                                </svg>
                            </div>
                            <span
                                class="text-[8px] text-white/60 font-bold uppercase truncate w-full text-center">Cozinha</span>
                        </button>
                    </div>
                </section>
                <!-- Keypad -->
                <section class="flex flex-col items-center flex-1 justify-center py-2" data-purpose="numpad">
                    <div class="w-full text-center mb-4 font-mono text-3xl text-white tracking-[0.25em] h-10 overflow-hidden whitespace-nowrap"
                        id="dial-display"></div>
                    <div class="grid grid-cols-3 gap-x-8 gap-y-3 w-full max-w-[280px]">
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('1')">1</button>
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('2')">2</button>
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('3')">3</button>
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('4')">4</button>
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('5')">5</button>
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('6')">6</button>
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('7')">7</button>
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('8')">8</button>
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('9')">9</button>
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('*')">*</button>
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('0')">0</button>
                        <button
                            class="numpad-btn aspect-square rounded-2xl bg-white/5 flex items-center justify-center text-2xl font-mono text-white/90 border border-white/5"
                            onclick="pressKey('#')">#</button>
                    </div>
                </section>
                <!-- Call Controls -->
                <section class="space-y-3 shrink-0 pb-4" data-purpose="call-controls">
                    <button
                        class="w-full py-4 rounded-2xl bg-rose-600 text-white font-bold letter-spacing-vpr text-xs uppercase flex items-center justify-center gap-3 soft-rose-glow hover:bg-rose-500 transition-all active:scale-[0.98]"
                        id="main-call-btn">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
                                stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        </svg>
                        Iniciar Chamada
                    </button>
                    <button
                        class="w-full py-4 rounded-2xl bg-emerald-500 text-white font-bold letter-spacing-vpr text-xs uppercase flex items-center justify-center gap-3 soft-emerald-glow hover:bg-emerald-400 transition-all active:scale-[0.98]">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"
                                stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        </svg>
                        Abrir Porta
                    </button>
                </section>
            </main>
            <footer class="p-3 bg-white/5 text-center border-t border-white/5 shrink-0">
                <p class="text-[9px] text-white/20 font-mono tracking-tighter uppercase">VPR_VERSION: 2.4.1-STABLE</p>
            </footer>
        </div>
    </div>
    <script>
        let isExpanded = true;
        let dialString = "";

        function toggleSoftphone() {
            const expanded = document.getElementById('expanded-panel');
            const wrapper = document.getElementById('softphone-wrapper');
            if (isExpanded) {
                expanded.classList.add('hidden');
                wrapper.classList.remove('h-full', 'justify-center');
                wrapper.classList.add('fixed', 'bottom-6', 'right-6', 'w-auto');
            } else {
                expanded.classList.remove('hidden');
                wrapper.classList.add('h-full', 'justify-center');
                wrapper.classList.remove('fixed', 'bottom-6', 'right-6', 'w-auto');
            }
            isExpanded = !isExpanded;
        }

        function pressKey(key) {
            if (dialString.length < 15) {
                dialString += key;
                document.getElementById('dial-display').innerText = dialString;
            }
        }

        document.getElementById('dial-display').addEventListener('click', () => {
            dialString = "";
            document.getElementById('dial-display').innerText = "";
        });

        const statuses = ['Pronto', 'Conectando', 'Ativo', 'Chamando'];
        const colors = ['text-emerald-500', 'text-amber-500', 'text-sky-500', 'text-rose-500'];
        let statusIdx = 0;

        setInterval(() => {
            statusIdx = (statusIdx + 1) % statuses.length;
            document.getElementById('status-badge').innerText = statuses[statusIdx];

            const signalIcon = document.getElementById('status-signal');
            signalIcon.className = `transition-colors duration-500 ${colors[statusIdx]}`;

            // Simulating dynamic notifications
            if (statusIdx === 1) document.getElementById('badge-package').classList.replace('opacity-20', 'opacity-100');
            if (statusIdx === 2) document.getElementById('badge-message').classList.replace('opacity-20', 'opacity-100');
            if (statusIdx === 0) {
                document.getElementById('badge-package').classList.replace('opacity-100', 'opacity-20');
                document.getElementById('badge-message').classList.replace('opacity-100', 'opacity-20');
            }
        }, 5000);
    </script>
</body>

</html>
